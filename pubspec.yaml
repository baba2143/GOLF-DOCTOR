name: golf_doctor_app
description: "GOLF DOCTOR - ゴルフレッスンマッチングアプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Supabase
  supabase_flutter: ^2.8.3

  # Routing
  go_router: ^14.8.1

  # UI Components
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1

  # Video
  video_player: ^2.9.3
  image_picker: ^1.1.2
  video_compress: ^3.1.3
  chewie: ^1.10.0

  # Payment
  flutter_stripe: ^11.5.0

  # Push Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # Storage & Cache
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Sign In
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.2.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
